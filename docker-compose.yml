version: "3.8"

services:
  resume-screening-agent:
    build: .
    container_name: resume-screening-agent
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - DB_PATH=/data/resumedb
    volumes:
      - resume-data:/data
    restart: unless-stopped

volumes:
  resume-data:
