spring.application.name=resume-screening-agent

# ---------------------------------------------------------------------------
# DATABASE (H2 - file based, so data persists across restarts / docker volume)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:${DB_PATH:./data/resumedb};AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console (handy for debugging, disable in real production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
# GEMINI LLM API CONFIG
# ---------------------------------------------------------------------------
gemini.api.key=${AQ.Ab8RN6J7_iVxvAq1Zl5s0wu7UvgX716R9Y_-N9Vv60vX67bMzA}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.api.base-url=https://aistudio.google.com/api-keys?project=gen-lang-client-0200989972
gemini.api.temperature=0.2

# ---------------------------------------------------------------------------
# FILE UPLOAD LIMITS
# ---------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ---------------------------------------------------------------------------
# SERVER
# ---------------------------------------------------------------------------
server.port=8080

logging.level.com.resumescreening=INFO
